name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  # Fast, single-platform checks: lint, typecheck, unit. Same suite lint-staged
  # runs on commit.
  quality:
    runs-on: ubuntu-latest
    name: Quality (lint, typecheck, unit)
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Run checks
        run: pnpm run test

  # Slow, platform-independent conformance suites (CPU single-step tests,
  # Acid800), kept off the fast `test` loop. Acid800's image/firmware are
  # committed; only the 65x02 vectors are fetched.
  conformance:
    runs-on: ubuntu-latest
    name: Conformance (single-step, Acid800)
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Disable AppArmor on Ubuntu
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      # SingleStepTests/65x02 6502 vectors for the CPU conformance suite. We
      # track upstream main (it changes rarely) but key the cache on its current
      # commit, so an unchanged upstream is a cache hit and a moved one
      # auto-refreshes — no pinned commit to maintain.
      - name: Resolve 65x02 vectors commit
        id: sst
        run: echo "sha=$(git ls-remote https://github.com/SingleStepTests/65x02 refs/heads/main | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache 65x02 vectors
        id: sst-cache
        uses: actions/cache@v6
        with:
          path: external.local/65x02/6502/v1
          key: sst-65x02-6502-v1-${{ steps.sst.outputs.sha }}

      - name: Fetch 65x02 vectors
        if: steps.sst-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v7
        with:
          repository: SingleStepTests/65x02
          ref: ${{ steps.sst.outputs.sha }}
          sparse-checkout: 6502/v1
          fetch-depth: 1
          path: external.local/65x02

      - name: Run conformance suites
        run: pnpm run conformance

  # Auto-deploy production, gated on both check jobs. Only on main (push or a
  # manual run of this workflow); never on PRs. The force/preview escape hatch
  # lives in deploy.yml, ungated.
  deploy:
    needs: [quality, conformance]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy to production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Deploy to production
        run: pnpm --filter @sfotty-pie/a8-web run deploy --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

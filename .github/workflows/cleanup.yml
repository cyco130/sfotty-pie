name: Cleanup old production deployments

# Cloudflare Pages never prunes deployments on its own, so keep only the live
# one plus the most recent few. Weekly, plus on demand.
on:
  workflow_dispatch:
  schedule:
    # Sundays 01:30 UTC.
    - cron: "30 1 * * 0"

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    name: Prune production deployments
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      # The script uses only Node built-ins + global fetch, so no install needed.
      - name: Delete old production deployments
        run: node apps/a8-web/scripts/delete-old-production-deployments.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

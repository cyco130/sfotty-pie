<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Sfotty Pie A8 Web</title>
		<link rel="icon" type="image/svg+xml" href="/sfotty-pie.svg" />
		<style>
			html,
			body,
			#app {
				margin: 0;
				height: 100%;
				background: #000;
			}
			html,
			body {
				/* It's an app, not a document: no rubber-band scroll, no
				   pull-to-refresh, no double-tap zoom, no iOS font inflation,
				   no tap-highlight flash on the touch controls. */
				overflow: hidden;
				overscroll-behavior: none;
				touch-action: manipulation;
				-webkit-text-size-adjust: 100%;
				-webkit-tap-highlight-color: transparent;
			}
		</style>
	</head>
	<body>
		<main id="app"></main>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
